services:
  promobot:
    build: .
    container_name: telegram-promobot
    restart: unless-stopped
    ports:
      - "3333:3333"
    volumes:
      - ./data:/app/data
      - ./session:/app/session
    env_file:
      - .env
    environment:
      - TELEGRAM_SESSION_FILE=/app/session/telegram.session
      - DATABASE_URL=sqlite:///app/data/promobot.db
    stdin_open: true
    tty: true
