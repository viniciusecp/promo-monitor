services:
  backend:
    build: ./server
    container_name: promo-monitor-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-3333}:${API_PORT:-3333}"
    env_file:
      - ./server/.env
    environment:
      - API_PORT=${API_PORT:-3333}
      - TELEGRAM_SESSION_FILE=/app/session/telegram.session
      - TELEGRAM_BOT_SESSION_FILE=/app/session/bot.session
    volumes:
      - ./server/data:/app/data
      - ./server/session:/app/session
    stdin_open: true   # necessário p/ o login interativo do Telegram na 1ª subida
    tty: true

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: promo-monitor-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend
